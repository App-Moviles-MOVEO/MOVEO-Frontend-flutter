# Base del directorio donde se descargará y desempaquetará la distribución de Gradle.
# 'GRADLE_USER_HOME' apunta por defecto a la carpeta del usuario del sistema (ej: ~/.gradle o C:\Users\Nombre\.gradle).
distributionBase=GRADLE_USER_HOME
# Ruta interna dentro de 'distributionBase' donde se guardará la versión de Gradle ya descomprimida y lista para usar.
distributionPath=wrapper/dists
# Base del directorio donde se almacenará temporalmente el archivo comprimido (.zip) descargado de Internet.
zipStoreBase=GRADLE_USER_HOME
# Ruta interna dentro de 'zipStoreBase' donde se guardará el archivo comprimido (.zip) antes de ser extraído.
zipStorePath=wrapper/dists
# URL oficial de donde el Wrapper descargará automáticamente Gradle si no lo encuentra en la máquina.
# Utiliza la versión '8.14-all', que incluye los binarios, las fuentes del código y la documentación oficial (ideal para autocompletado).
distributionUrl=https\://services.gradle.org/distributions/gradle-8.14-all.zip
